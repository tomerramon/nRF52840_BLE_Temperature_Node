# Sensor module
CONFIG_SENSOR=y

# Logger module
CONFIG_LOG=y

# Button and LED library
CONFIG_DK_LIBRARY=y

# Bluetooth LE
CONFIG_BT=y

# Bluetooth Peripheral role
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME="ENV_NODE"

# Watchdog
CONFIG_WATCHDOG=y
CONFIG_WDT_NRFX=y